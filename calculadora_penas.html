<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Penas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --surface2: #f6f8fa;
  --border:   #d0d7de;
  --border2:  #e4e8ec;
  --text:     #1a1f29;
  --muted:    #6e7781;
  --accent:   #1a56db;
  --accent2:  #1d4ed8;
  --green:    #166534;
  --green-bg: #dcfce7;
  --red:      #991b1b;
  --red-bg:   #fee2e2;
  --orange:   #92400e;
  --orange-bg:#fef3c7;
  --display:  #1a1f29;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:flex-start;
  justify-content:center; padding:24px 12px;
}

/* ── Wrapper ── */
.calc{
  width:100%; max-width:440px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
  overflow:hidden;
}

/* ── Header ── */
.calc-header{
  padding:12px 18px 11px;
  border-bottom:1px solid var(--border2);
  display:flex; align-items:center; gap:9px;
  background:var(--surface);
}
.calc-header-dot{
  width:8px; height:8px; border-radius:50%; background:var(--accent);
}
.calc-header-title{
  font-size:.68rem; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:2px;
}

/* ── Seção interna ── */
.section{ padding:14px 16px; border-bottom:1px solid var(--border2); }
.section:last-child{ border-bottom:none; }
.section-lbl{
  font-size:.58rem; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:1.8px; margin-bottom:9px;
}

/* ── Displays ── */
.disp-col{ flex:1; position:relative; }
.disp-lbl{
  font-size:.58rem; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:5px;
}
.display-input{
  width:100%; background:#f8fafc; border:1.5px solid var(--border);
  border-radius:10px;
  color:var(--display); font-family:'JetBrains Mono',monospace;
  font-size:1.9rem; font-weight:700; text-align:center;
  padding:8px 10px 6px; height:56px;
  -moz-appearance:textfield; transition:border-color .15s, background .15s;
}
.display-input::-webkit-outer-spin-button,
.display-input::-webkit-inner-spin-button{ -webkit-appearance:none; }
.display-input:focus{
  outline:none; border-color:var(--accent);
  background:#eff6ff; z-index:1; position:relative;
}

/* ── Operadores ── */
.obtn{
  height:40px; border:none; border-radius:9px;
  font-size:1rem; font-weight:700; cursor:pointer;
  transition:filter .1s, transform .08s;
  font-family:'Inter',sans-serif;
}
.obtn:active{ transform:scale(.93); }
.obtn:hover{ filter:brightness(.93); }
.op-plus{ background:#dcfce7; color:#15803d; border:1.5px solid #bbf7d0; }
.op-eq  { background:var(--accent); color:#fff; border:1.5px solid var(--accent2); }
.op-min { background:#fee2e2; color:#dc2626; border:1.5px solid #fecaca; }
.op-c   { background:var(--surface2); color:var(--muted); border:1.5px solid var(--border); }

/* ── Acumulador ── */
.acum-bar{
  display:none; margin-top:8px;
  background:#eff6ff; border:1.5px solid #bfdbfe;
  border-radius:7px; padding:5px 11px;
  font-size:.7rem; color:var(--muted); font-family:'JetBrains Mono',monospace;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.acum-bar .av{ color:var(--accent); font-weight:700; }
.acum-bar .ao{ color:var(--muted); }

/* ── Teclado ── */
#keypad{
  display:grid; grid-template-columns:repeat(3,1fr); gap:6px;
}
.kbtn{
  height:40px; background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:8px; color:var(--text); font-size:1rem; font-weight:600;
  cursor:pointer; transition:background .1s, border-color .1s, transform .08s;
  font-family:'Inter',sans-serif;
}
.kbtn:hover{ background:#e2e8f0; border-color:var(--border); }
.kbtn:active{ transform:scale(.93); background:#dde3ea; }

/* ── Botões de fração/% ── */
.btn-row{ display:flex; gap:6px; flex-wrap:wrap; }
.fbtn{
  padding:5px 12px;
  border:2px solid var(--border);
  border-radius:20px;
  background:var(--surface2);
  color:var(--muted);
  font-size:.73rem; font-weight:700;
  cursor:pointer; transition:all .12s; white-space:nowrap;
  font-family:'Inter',sans-serif; letter-spacing:.2px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.fbtn:hover{
  border-color:var(--accent); color:var(--accent);
  background:#eff6ff; box-shadow:0 2px 8px rgba(26,86,219,.12);
}
.fbtn.active{
  background:var(--accent); border-color:var(--accent2);
  color:#fff; box-shadow:0 2px 10px rgba(26,86,219,.28);
}
.fbtn-custom{
  border-style:dashed; border-color:#d97706; color:#d97706;
  background:#fffbeb;
}
.fbtn-custom:hover{
  border-style:solid; border-color:#b45309; color:#b45309;
  background:#fef3c7; box-shadow:0 2px 8px rgba(217,119,6,.15);
}
.fbtn-custom.active{
  background:#d97706; border-style:solid; border-color:#b45309;
  color:#fff; box-shadow:0 2px 10px rgba(217,119,6,.28);
}

/* ── Término ── */
.termino-row{
  display:flex; align-items:center; justify-content:space-between;
  background:#f0f7ff; border:1.5px solid #bfdbfe;
  border-radius:8px; padding:8px 13px; margin-bottom:10px;
}
.termino-lbl{ font-size:.65rem; color:var(--muted); font-weight:600; }
.termino-val{
  font-family:'JetBrains Mono',monospace; font-size:.9rem;
  font-weight:700; color:var(--accent); letter-spacing:.5px;
}

/* ── Grade resultados ── */
.results-grid{
  display:grid; grid-template-columns:1fr 1fr; gap:1px;
  background:var(--border2); border:1.5px solid var(--border);
  border-radius:9px; overflow:hidden; margin-bottom:10px;
}
.res-cell{
  background:var(--surface); padding:10px 12px;
}
.res-cell-frac{
  font-size:.58rem; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:3px;
}
.res-cell-time{
  font-family:'JetBrains Mono',monospace; font-size:.87rem;
  font-weight:700; color:var(--text); line-height:1.2;
}
.res-cell-date{
  font-size:.72rem; font-weight:600; margin-top:4px;
  font-family:'JetBrains Mono',monospace;
  display:inline-block; padding:1px 6px; border-radius:4px;
}
.res-cell-date.passado{ color:var(--red);    background:var(--red-bg); }
.res-cell-date.hoje   { color:var(--orange); background:var(--orange-bg); }
.res-cell-date.futuro { color:var(--green);  background:var(--green-bg); }
.res-cell-sit{
  font-size:.57rem; color:var(--muted); margin-top:3px;
  font-weight:500;
}
.res-cell-sit.ok{ color:var(--red); }
.res-cell-sit.hj{ color:var(--orange); }

/* ── Opção remidos ── */
.remopt-row{ display:flex; flex-direction:column; gap:5px; }
.remopt-row label{
  display:flex; align-items:center; gap:8px;
  font-size:.68rem; color:var(--muted); cursor:pointer;
}
.remopt-row input{ accent-color:var(--accent); cursor:pointer; }

/* ── Campos de data/número ── */
.fields-row{ display:flex; gap:8px; margin-bottom:9px; align-items:flex-end; flex-wrap:wrap; }
.fields-row:last-child{ margin-bottom:0; }
.fg{ flex:1; min-width:64px; }
.fg label{
  display:block; font-size:.58rem; font-weight:700;
  color:var(--muted); margin-bottom:4px; letter-spacing:.3px;
  text-transform:uppercase;
}
.fg input[type="date"],
.fg input[type="number"]{
  width:100%; background:var(--surface); border:1.5px solid var(--border);
  border-radius:7px; color:var(--text); font-size:.82rem;
  padding:7px 9px; font-family:'Inter',sans-serif;
  transition:border-color .15s, background .15s;
}
.fg input:focus{ outline:none; border-color:var(--accent); background:#eff6ff; }
.int-group{ display:flex; gap:5px; }
.int-group .fg{ min-width:44px; }
.int-lbl{
  font-size:.58rem; font-weight:700; color:var(--muted);
  margin-bottom:5px; letter-spacing:.3px; display:block;
  text-transform:uppercase;
}

/* ── Resultado período ── */
.per-res{
  display:none; margin-top:9px;
  background:#f0f7ff; border:1.5px solid #bfdbfe;
  border-radius:8px; padding:11px 13px;
}
.pv{ font-family:'JetBrains Mono',monospace; font-size:.95rem; font-weight:700; color:var(--accent); }
.ps{ font-size:.62rem; color:var(--muted); margin-top:2px; }
.pbs{ display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
.pb{
  padding:4px 10px; border:none; border-radius:6px;
  cursor:pointer; font-size:.68rem; font-weight:700;
  font-family:'Inter',sans-serif;
}

/* ── Redação ── */
.redacao-wrap{
  background:#f0f7ff; border:1.5px solid #bfdbfe;
  border-radius:8px; padding:10px 13px;
}
.redacao-txt{
  font-size:.85rem; color:var(--text); line-height:1.7;
  cursor:pointer; user-select:all; letter-spacing:.1px;
  font-weight:500;
}
.redacao-txt:hover{ color:var(--accent); }
.copy-hint{ font-size:.58rem; color:var(--muted); margin-top:5px; }

/* ── Botão calcular período ── */
.btn-calc-per{
  padding:7px 13px; background:var(--accent); color:#fff;
  border:none; border-radius:7px; cursor:pointer;
  font-size:.72rem; font-weight:700; font-family:'Inter',sans-serif;
  transition:background .12s;
}
.btn-calc-per:hover{ background:var(--accent2); }

/* ── Modal ── */
.modal-overlay{
  display:none; position:fixed; inset:0;
  background:rgba(15,23,42,.45); z-index:100;
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{ display:flex; }
.modal{
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:14px; padding:22px; width:264px; max-width:92vw;
  box-shadow:0 16px 48px rgba(0,0,0,.15);
}
.modal h3{ font-size:.82rem; font-weight:700; color:var(--text); margin-bottom:14px; }
.modal label{
  font-size:.6rem; font-weight:700; color:var(--muted);
  display:block; margin-bottom:4px; margin-top:11px;
  text-transform:uppercase; letter-spacing:.5px;
}
.modal input{
  width:100%; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:7px; color:var(--text); font-size:.88rem;
  padding:7px 9px; font-family:'Inter',sans-serif;
}
.modal input:focus{ outline:none; border-color:var(--accent); background:#eff6ff; }
.fi{ display:flex; gap:6px; align-items:center; }
.fi input{ flex:1; }
.fi span{ color:var(--muted); font-size:1rem; }
.modal-btns{ display:flex; gap:8px; margin-top:15px; }
.modal-btns button{
  flex:1; padding:8px; border:none; border-radius:7px;
  cursor:pointer; font-weight:700; font-size:.78rem;
  font-family:'Inter',sans-serif;
}
.bok{ background:var(--accent); color:#fff; }
.bcan{ background:var(--surface2); color:var(--muted); border:1.5px solid var(--border); }
</style>
</head>
<body>

<div class="calc">

  <!-- HEADER -->
  <div class="calc-header">
    <div class="calc-header-dot"></div>
    <span class="calc-header-title" style="flex:1;">Calculadora de Penas</span>
    <span style="font-size:.65rem;font-weight:700;color:var(--muted);letter-spacing:1px;">LEP 2026</span>
  </div>

  <!-- DISPLAYS + OPERADORES -->
  <div class="section" style="padding-bottom:12px;">
    <div class="section-lbl">Pena Base</div>
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <div class="disp-col">
        <div class="disp-lbl">Anos</div>
        <input type="text" inputmode="none" class="display-input" id="disp-anos" value="0" oninput="recalc()" onfocus="setFoco('anos')">
      </div>
      <div class="disp-col">
        <div class="disp-lbl">Meses</div>
        <input type="text" inputmode="none" class="display-input" id="disp-meses" value="0" oninput="recalc()" onfocus="setFoco('meses')">
      </div>
      <div class="disp-col">
        <div class="disp-lbl">Dias</div>
        <input type="text" inputmode="none" class="display-input" id="disp-dias" value="0" oninput="recalc()" onfocus="setFoco('dias')">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
      <button class="obtn op-plus" onclick="opAcum('+')">+</button>
      <button class="obtn op-min"  onclick="opAcum('−')">−</button>
      <button class="obtn op-c"    onclick="clearAll()">C</button>
      <button class="obtn op-eq"   onclick="opIgual()">=</button>
    </div>
    <div class="acum-bar" id="acum-bar">
      <span class="av" id="acum-val"></span>&nbsp;<span class="ao" id="acum-ops"></span>
    </div>
  </div>

  <!-- TECLADO -->
  <div class="section" style="padding-top:10px;padding-bottom:10px;">
    <div id="keypad"></div>
  </div>

  <!-- FRAÇÕES / PERCENTUAIS -->
  <div class="section">
    <div class="section-lbl">Progressão — Frações e Percentuais</div>
    <div class="btn-row" id="grp-criterios"></div>
  </div>

  <!-- TÉRMINO + GRADE -->
  <div class="section" id="results-section" style="display:none;">
    <div class="termino-row">
      <span class="termino-lbl">Término da pena</span>
      <span class="termino-val" id="res-term">—</span>
    </div>
    <div class="results-grid" id="results-grid"></div>
    <div class="remopt-row">
      <label><input type="radio" name="remopt" value="antes" checked onchange="recalc()"> Retirar remidos antes de calcular a fração</label>
      <label><input type="radio" name="remopt" value="depois" onchange="recalc()"> Retirar remidos após calcular a fração</label>
    </div>
  </div>

  <!-- REDAÇÃO -->
  <div class="section" id="redacao-section" style="display:none;">
    <div class="section-lbl">Redação para a peça</div>
    <div class="redacao-wrap">
      <div class="redacao-txt" id="redacao-txt" onclick="copiarRedacao(this)">—</div>
      <div class="copy-hint">Clique para copiar</div>
    </div>
  </div>

  <!-- PERÍODO ENTRE DATAS -->
  <div class="section">
    <div class="section-lbl">Período entre Datas</div>
    <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
      <div class="fg"><label>Data inicial</label><input type="date" id="pi"></div>
      <div class="fg"><label>Data final</label><input type="date" id="pf"></div>
      <div style="padding-bottom:0;">
        <label style="font-size:.6rem;color:transparent;display:block;margin-bottom:4px;">_</label>
        <button class="btn-calc-per" onclick="calcPeriodo()">Calcular</button>
      </div>
    </div>
    <div class="per-res" id="per-res"></div>
  </div>

  <!-- INÍCIO E EXECUÇÃO -->
  <div class="section">
    <div class="section-lbl">Início e Execução da Pena</div>
    <div class="fields-row">
      <div class="fg"><label>Início em</label><input type="date" id="inicio" oninput="recalc()" onchange="recalc()"></div>
      <div class="fg"><label>Remidos (dias)</label><input type="number" id="remidos" min="0" value="0" oninput="recalc()"></div>
    </div>
    <span class="int-lbl">Interrupção</span>
    <div class="int-group">
      <div class="fg"><label>Anos</label><input type="number" id="ia" min="0" value="0" oninput="recalc()"></div>
      <div class="fg"><label>Meses</label><input type="number" id="im" min="0" value="0" oninput="recalc()"></div>
      <div class="fg"><label>Dias</label><input type="number" id="id" min="0" value="0" oninput="recalc()"></div>
    </div>
  </div>

</div><!-- /calc -->

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Outra fração / percentual</h3>
    <label>Percentual (ex: 33,33)</label>
    <input type="text" id="m-pct" placeholder="deixe vazio para usar fração">
    <label>Fração</label>
    <div class="fi">
      <input type="number" id="m-num" placeholder="num" min="1">
      <span>/</span>
      <input type="number" id="m-den" placeholder="den" min="1">
    </div>
    <label>Rótulo (opcional)</label>
    <input type="text" id="m-label" placeholder="">
    <div class="modal-btns">
      <button class="bok" onclick="addCustom()">OK</button>
      <button class="bcan" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ── Convenção penal: 1 ano=360 d, 1 mês=30 d ──────────────────────────────
function toDias(a,m,d){ return a*360 + m*30 + d; }
function toAMD(t){
  t = Math.max(0, Math.floor(t));
  const a = Math.floor(t/360), r = t - a*360;
  const m = Math.floor(r/30),  d = r - m*30;
  return {a,m,d};
}
function fmt(a,m,d){
  const p=[];
  if(a) p.push(a+(a===1?' a':' a'));
  if(m) p.push(m+(m===1?' m':' m'));
  if(d) p.push(d+(d===1?' d':' d'));
  return p.length ? p.join(', ') : '0 d';
}

// Redação por extenso: "01 ano, 11 meses e 10 dias"
const NUMS = ['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez',
  'onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove','vinte',
  'vinte e um','vinte e dois','vinte e três','vinte e quatro','vinte e cinco','vinte e seis',
  'vinte e sete','vinte e oito','vinte e nove','trinta'];
function porExtenso(n){ return n<=30 ? NUMS[n] : n+''; }
function fmtRedacao(a,m,d){
  const p=[];
  if(a) p.push(String(a).padStart(2,'0')+' ('+porExtenso(a)+') '+(a===1?'ano':'anos'));
  if(m) p.push(String(m).padStart(2,'0')+' ('+porExtenso(m)+') '+(m===1?'mês':'meses'));
  if(d) p.push(String(d).padStart(2,'0')+' ('+porExtenso(d)+') '+(d===1?'dia':'dias'));
  if(!p.length) return '';
  if(p.length===1) return p[0];
  return p.slice(0,-1).join(', ')+' e '+p[p.length-1];
}

function addD(str,n){ const x=new Date(str+'T12:00:00'); x.setDate(x.getDate()+n); return x; }
function fmtD(d){ return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function sit(da){
  const h=new Date(); h.setHours(0,0,0,0);
  const x=new Date(da); x.setHours(0,0,0,0);
  if(x<h) return 'passado';
  if(x.getTime()===h.getTime()) return 'hoje';
  return 'futuro';
}

// ── Leitura dos displays (agora são inputs reais) ─────────────────────────
let foco = 'anos';
function getDisp(c){ return parseInt(document.getElementById('disp-'+c).value)||0; }
function setDisp(c,v){ document.getElementById('disp-'+c).value = v; }
function getPena(){ return { anos:getDisp('anos'), meses:getDisp('meses'), dias:getDisp('dias') }; }
function setPena(a,m,d){ setDisp('anos',a); setDisp('meses',m); setDisp('dias',d); }

function setFoco(campo){
  foco = campo;
  ['anos','meses','dias'].forEach(c => {
    document.getElementById('disp-'+c).style.borderColor = (c===campo)?'#4fc3f7':'#444';
  });
}

// teclado na tela — digita concatenando no campo com foco
function pressKey(k){
  const el = document.getElementById('disp-'+foco);
  if(k==='del'){
    el.value = Math.floor((parseInt(el.value)||0)/10);
  } else {
    const cur = parseInt(el.value)||0;
    el.value  = parseInt(''+cur+k) || 0;
  }
  el.dispatchEvent(new Event('input'));
}

// Teclado único
(function(){
  const kp = document.getElementById('keypad');
  [1,2,3,4,5,6,7,8,9,0,'⌫'].forEach(k => {
    const btn = document.createElement('button');
    btn.textContent = k;
    btn.style.cssText=`padding:10px 4px;background:#2a2a2a;border:1px solid #444;
      border-radius:4px;color:#ccc;font-size:1rem;font-weight:bold;cursor:pointer;transition:.1s;`;
    btn.onmouseenter=()=>btn.style.background='#444';
    btn.onmouseleave=()=>btn.style.background='#2a2a2a';
    btn.onclick=()=>{ pressKey(k==='⌫'?'del':String(k)); };
    kp.appendChild(btn);
  });
})();

// ── Critérios únicos ordenados por valor (sem repetição) ─────────────────────
// Onde fração clássica e percentual legal coincidem → um único botão com ambas
const CRITERIOS = [
  { label:'1/6 (16%)',  pct:1/6  },
  { label:'1/5 (20%)',  pct:1/5  },
  { label:'1/4 (25%)',  pct:1/4  },
  { label:'30%',        pct:.30  },
  { label:'1/3 (33%)',  pct:1/3  },
  { label:'40%',        pct:.40  },
  { label:'1/2 (50%)',  pct:1/2  },
  { label:'55%',        pct:.55, vedado:true },
  { label:'60%',        pct:.60  },
  { label:'2/3 (67%)',  pct:2/3  },
  { label:'70%',        pct:.70  },
  { label:'75%',        pct:.75, vedado:true },
  { label:'80%',        pct:.80  },
  { label:'85%',        pct:.85, vedado:true },
];

// As 6 frações clássicas que sempre aparecem na grade de resultado
const FRACOES_GRADE = [
  { label:'1/6', pct:1/6 }, { label:'1/5', pct:1/5 }, { label:'1/4', pct:1/4 },
  { label:'1/3', pct:1/3 }, { label:'1/2', pct:1/2 }, { label:'2/3', pct:2/3 },
];

const extraSelected = new Map();
let customCount = 0;

// Renderizar botão ⚙ + botões únicos
(function(){
  const grp = document.getElementById('grp-criterios');
  // ⚙ primeiro
  const custom = document.createElement('button');
  custom.className = 'fbtn fbtn-custom';
  custom.id = 'btn-add-custom';
  custom.textContent = '⚙';
  custom.title = 'Outra fração / percentual';
  custom.onclick = () => openModal();
  grp.appendChild(custom);

  CRITERIOS.forEach((item,i) => {
    const id = 'c_'+i;
    item._id = id;
    const btn = document.createElement('button');
    btn.className = 'fbtn';
    btn.id = 'fbtn_'+id;
    btn.textContent = item.label + (item.vedado?' ⛔':'');
    btn.title = item.vedado ? 'Vedado livramento condicional (em ao menos um inciso)' : '';
    btn.onclick = () => clicarBtn(id, item, btn);
    grp.appendChild(btn);
  });
})();

function clicarBtn(id, item, btn) {
  if(opPending !== null){
    const p = getPena();
    const fracDias = Math.floor(opBase * item.pct);
    const sinal    = (opPending==='+') ? 1 : -1;
    acumDias      += sinal * fracDias;
    const amd      = toAMD(fracDias);
    acumLog.push(opPending+' '+item.label+' ('+fmt(amd.a,amd.m,amd.d)+')');
    opPending = null; opBase = 0;
    atualizarAcumBar(null);
    const res = toAMD(Math.abs(acumDias));
    setPena(res.a, res.m, res.d);
    recalc();
    return;
  }
  if(extraSelected.has(id)){
    extraSelected.delete(id);
    btn.classList.remove('active');
  } else {
    extraSelected.set(id, item);
    btn.classList.add('active');
  }
  recalc();
}

// ── Acumulador ───────────────────────────────────────────────────────────────
let acumDias=0, acumLog=[], opPending=null, opBase=0;

function opAcum(op){
  const p = getPena();
  const dias = toDias(p.anos, p.meses, p.dias);
  if(!dias){ alert('Informe a pena.'); return; }

  if(acumLog.length===0){
    acumDias = dias;
    acumLog.push(fmt(p.anos, p.meses, p.dias));
  } else if(opPending!==null){
    acumDias += ((opPending==='+')?1:-1) * dias;
    acumLog.push(opPending+' '+fmt(p.anos, p.meses, p.dias));
  }

  opPending = op; opBase = dias;
  setPena(0,0,0);
  atualizarAcumBar('← clique numa fração ou digite e pressione =');
}

function opIgual(){
  const p = getPena();
  const dias = toDias(p.anos, p.meses, p.dias);

  if(opPending!==null){
    if(!dias){ alert('Digite um valor ou clique em uma fração.'); return; }
    acumDias += ((opPending==='+')?1:-1) * dias;
    acumLog.push(opPending+' '+fmt(p.anos, p.meses, p.dias));
    opPending=null; opBase=0;
  } else {
    if(!dias && acumLog.length===0){ alert('Informe uma pena.'); return; }
    if(dias){ acumDias+=dias; acumLog.push(fmt(p.anos,p.meses,p.dias)); }
  }

  if(acumDias<=0){ alert('Resultado zerado ou negativo.'); resetAcum(); return; }
  const res = toAMD(acumDias);
  setPena(res.a, res.m, res.d);
  resetAcum();
  recalc();
}

function atualizarAcumBar(hint){
  document.getElementById('acum-bar').style.display='block';
  const p=toAMD(Math.abs(acumDias));
  document.getElementById('acum-val').textContent = (acumDias<0?'−':'')+fmt(p.a,p.m,p.d);
  document.getElementById('acum-ops').textContent = acumLog.join(' ')+(hint?' '+hint:'');
}

function resetAcum(){
  acumDias=0; acumLog=[]; opPending=null; opBase=0;
  document.getElementById('acum-bar').style.display='none';
}

function clearAll(){
  setPena(0,0,0);
  resetAcum();
  ['ia','im','id','remidos'].forEach(id=>document.getElementById(id).value=0);
  document.getElementById('inicio').value='';
  document.getElementById('redacao-txt').textContent='—';
  recalc();
}

// ── Recalcular ───────────────────────────────────────────────────────────────
function recalc(){
  const p = getPena();
  const bruta = toDias(p.anos, p.meses, p.dias);
  document.getElementById('results-section').style.display = bruta ? '' : 'none';
  document.getElementById('redacao-section').style.display = bruta ? '' : 'none';
  if(!bruta){
    document.getElementById('results-grid').innerHTML='';
    document.getElementById('res-term').textContent='—';
    document.getElementById('redacao-txt').textContent='—';
    return;
  }

  const intD     = toDias(parseInt(document.getElementById('ia').value)||0,
                           parseInt(document.getElementById('im').value)||0,
                           parseInt(document.getElementById('id').value)||0);
  const rem      = parseInt(document.getElementById('remidos').value)||0;
  const remAntes = document.querySelector('input[name="remopt"]:checked').value==='antes';
  const inicio   = document.getElementById('inicio').value;
  const temData  = !!inicio;

  const efetBase  = Math.max(0, bruta - intD - (remAntes ? rem : 0));
  const efetTotal = Math.max(0, bruta - intD - rem);
  const ef        = toAMD(efetTotal);

  // Término
  document.getElementById('res-term').textContent =
    temData ? fmtD(addD(inicio, efetTotal)) : fmt(ef.a,ef.m,ef.d);

  // Redação
  document.getElementById('redacao-txt').textContent =
    fmtRedacao(ef.a, ef.m, ef.d) || '—';

  // Grade
  function buildCell(item, cor){
    const fracDias = Math.floor(efetBase * item.pct);
    const fracEfet = remAntes ? fracDias : Math.max(0, fracDias-rem);
    const amd = toAMD(fracDias);
    const cell = document.createElement('div');
    cell.className='res-cell';
    if(cor) cell.style.borderColor=cor;
    let dateHTML='';
    if(temData){
      const da=addD(inicio,fracEfet), s=sit(da);
      dateHTML=`<div class="res-cell-date ${s}">${fmtD(da)}</div>
        <div class="res-cell-sit ${s==='passado'?'ok':s==='hoje'?'hj':''}">${s==='passado'?'✔ Atingido':s==='hoje'?'HOJE':'Pendente'}${item.vedado?' ⛔':''}</div>`;
    }
    cell.innerHTML=`<div class="res-cell-frac" ${cor?'style="color:#ffd54f;"':''}>${item.label}</div>
      <div class="res-cell-time">${fmt(amd.a,amd.m,amd.d)}</div>${dateHTML}`;
    return cell;
  }

  const grid=document.getElementById('results-grid');
  grid.innerHTML='';
  FRACOES_GRADE.forEach(item => grid.appendChild(buildCell(item, null)));
  [...extraSelected.values()].sort((a,b)=>a.pct-b.pct)
    .forEach(item => grid.appendChild(buildCell(item,'#4fc3f7')));
}

// ── Copiar redação ────────────────────────────────────────────────────────────
function copiarRedacao(el){
  const txt = el.textContent;
  if(txt==='—') return;
  navigator.clipboard.writeText(txt).then(()=>{
    const orig = el.style.background;
    el.style.background='#1b5e20';
    setTimeout(()=>el.style.background=orig, 600);
  });
}

// ── Modal personalizado ───────────────────────────────────────────────────────
function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  ['m-pct','m-num','m-den','m-label'].forEach(id=>document.getElementById(id).value='');
}
document.getElementById('modal').addEventListener('click', e=>{if(e.target===document.getElementById('modal'))closeModal();});

function addCustom(){
  const pctStr=document.getElementById('m-pct').value.trim().replace(',','.');
  const num=parseFloat(document.getElementById('m-num').value);
  const den=parseFloat(document.getElementById('m-den').value);
  const lbl=document.getElementById('m-label').value.trim();
  let frac,label;
  if(pctStr){frac=parseFloat(pctStr)/100;label=lbl||(pctStr.replace('.',',')+'%');}
  else if(num&&den){frac=num/den;label=lbl||(num+'/'+den);}
  else{alert('Informe percentual ou fração.');return;}
  if(isNaN(frac)||frac<=0||frac>1){alert('Valor inválido.');return;}
  customCount++;
  const id='custom_'+customCount;
  const item={label,pct:frac,_id:id};
  extraSelected.set(id,item);
  const grp=document.getElementById('grp-criterios');
  const btn=document.createElement('button');
  btn.className='fbtn fbtn-custom active'; btn.id='fbtn_'+id;
  const txt2=document.createTextNode(label+' ');
  const rm=document.createElement('span');
  rm.textContent='×'; rm.style.opacity='.6';
  rm.onclick=e=>{e.stopPropagation();extraSelected.delete(id);btn.remove();recalc();};
  btn.appendChild(txt2); btn.appendChild(rm);
  btn.onclick=()=>clicarBtn(id,item,btn);
  grp.appendChild(btn);
  closeModal(); recalc();
}

// ── Período entre datas ───────────────────────────────────────────────────────
let _perAMD=null;
function calcPeriodo(){
  const i=document.getElementById('pi').value, f=document.getElementById('pf').value;
  if(!i||!f){alert('Informe as duas datas.');return;}
  const d1=new Date(i+'T12:00:00'), d2=new Date(f+'T12:00:00');
  if(d2<d1){alert('Data final deve ser posterior.');return;}
  const dias=Math.round((d2-d1)/86400000);
  let a=d2.getFullYear()-d1.getFullYear(),m=d2.getMonth()-d1.getMonth(),d=d2.getDate()-d1.getDate();
  if(d<0){m--;d+=30;} if(m<0){a--;m+=12;}
  _perAMD={a:Math.max(0,a),m:Math.max(0,m),d:Math.max(0,d)};
  const res=document.getElementById('per-res');
  res.style.display='block';
  res.innerHTML=`<div class="pv">${fmt(_perAMD.a,_perAMD.m,_perAMD.d)}</div>
    <div class="ps">${dias} dias corridos</div>
    <div class="pbs">
      <button class="pb" style="background:#1565c0;color:#fff;" onclick="cpPena()">Copiar para a pena</button>
      <button class="pb" style="background:#4a148c;color:#fff;" onclick="cpInt()">Copiar para interrupção</button>
    </div>`;
}
function cpPena(){ if(!_perAMD)return; setPena(_perAMD.a,_perAMD.m,_perAMD.d); recalc(); }
function cpInt(){
  if(!_perAMD)return;
  document.getElementById('ia').value=_perAMD.a;
  document.getElementById('im').value=_perAMD.m;
  document.getElementById('id').value=_perAMD.d;
  recalc();
}

// ── Init ──────────────────────────────────────────────────────────────────────
setFoco('anos');
document.getElementById('pi').valueAsDate = new Date();
document.getElementById('pf').valueAsDate = new Date();
</script>
